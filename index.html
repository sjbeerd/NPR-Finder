    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, (err) => {
                    document.getElementById('status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true, timeout: 7000, maximumAge: 0 });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const cb = Date.now();
            
            try {
                // STEP 1: Search for 'News' or 'Talk' tags specifically within the US
                const newsUrl = `https://de1.api.radio-browser.info/json/stations/search?countrycode=US&tag=news,talk&limit=200&cb=${cb}`;
                // STEP 2: Search for 'NPR' or 'Public Radio' tags as a fallback
                const fallbackUrl = `https://de1.api.radio-browser.info/json/stations/search?countrycode=US&tag=npr,public%20radio&limit=200&cb=${cb}`;

                const [newsRes, fallbackRes] = await Promise.all([fetch(newsUrl), fetch(fallbackUrl)]);
                const newsStations = await newsRes.json();
                const fallbackStations = await fallbackRes.json();

                // Merge and filter for unique entries
                const allStations = [...newsStations, ...fallbackStations];
                
                let primaryQueue = [];
                let secondaryQueue = [];

                allStations.forEach(s => {
                    if (s.geo_lat && s.geo_long) {
                        const d = getD(lat, lon, s.geo_lat, s.geo_long);
                        const tags = (s.tags || "").toLowerCase();
                        const name = s.name.toLowerCase();

                        // Logic: If it's explicitly music (classical/jazz), send to secondary
                        const isMusic = tags.includes('classical') || tags.includes('jazz') || name.includes('classical');
                        
                        if (!isMusic) {
                            primaryQueue.push({ ...s, dist: d });
                        } else {
                            secondaryQueue.push({ ...s, dist: d });
                        }
                    }
                });

                // Sort by distance
                primaryQueue.sort((a, b) => a.dist - b.dist);
                secondaryQueue.sort((a, b) => a.dist - b.dist);

                // FINAL SELECTION: 
                // We will take the closest non-music station within a 200-mile range.
                // If nothing is found, we fall back to the closest music-public station.
                let best = (primaryQueue.length > 0 && primaryQueue[0].dist < 200) 
                           ? primaryQueue[0] 
                           : secondaryQueue[0];

                if (best) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = best.name.split(/[-|]/)[0].trim();
                    
                    const fMatch = (best.name + " " + (best.tags || "")).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = fMatch ? fMatch[0] + " FM" : "Check Dial";
                    
                    document.getElementById('meta').innerText = `${best.state || ''} (${best.dist.toFixed(1)} miles away)`;
                }
            } catch (e) { 
                document.getElementById('status').innerText = "Sync Failed"; 
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
