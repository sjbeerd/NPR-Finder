<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder</title>
    <style>
        :root { --blue: #003087; --red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; color: #333; }
        #app { padding: 20px; width: 100%; max-width: 400px; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.2rem; font-weight: 900; color: var(--blue); margin: 15px 0; line-height: 1.1; }
        .freq { font-size: 4rem; font-weight: 300; color: var(--red); }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
        button { margin-top: 30px; padding: 12px 24px; border-radius: 25px; border: 1px solid #eee; background: #fafafa; font-size: 0.8rem; color: #666; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Scanning Airwaves...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
        <button onclick="location.reload()">Refresh Signal</button>
    </div>

    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, (err) => {
                    document.getElementById('status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const cb = Date.now();

            try {
                // Fetching from a reliable open mirror of the radio database
                const url = `https://de1.api.radio-browser.info/json/stations/search?countrycode=US&limit=500&hidebroken=true&order=distance&lat=${lat}&long=${lon}&cb=${cb}`;
                const res = await fetch(url);
                const stations = await res.json();

                // 1. Filter for Public Radio / NPR keywords
                // 2. STERNLY exclude "Classical" or "Music" stations to avoid the WMHT trap
                const newsKeywords = ['npr', 'public', 'news', 'talk', 'information'];
                const musicKeywords = ['classical', 'jazz', 'music', 'classic', 'mellow'];

                let matches = stations.filter(s => {
                    const data = (s.name + " " + s.tags).toLowerCase();
                    const hasNews = newsKeywords.some(k => data.includes(k));
                    const hasMusic = musicKeywords.some(k => data.includes(k));
                    return hasNews && !hasMusic;
                });

                // If we found a News station, take the closest. 
                // Otherwise, take the absolute closest station as a fallback.
                const best = matches.length > 0 ? matches[0] : stations[0];

                if (best) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = best.name.split(/[-|]/)[0].trim();
                    
                    // Extract frequency (e.g., 91.7)
                    const fMatch = (best.name + " " + best.tags).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = fMatch ? fMatch[0] + " FM" : "Check Dial";
                    
                    const d = calculateDistance(lat, lon, best.geo_lat, best.geo_long);
                    document.getElementById('meta').innerText = `${best.state || ''} (${d.toFixed(1)} miles away)`;
                }
            } catch (e) {
                document.getElementById('status').innerText = "Database Error";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
