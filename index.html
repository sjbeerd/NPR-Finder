<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Public Radio Finder</title>
    <style>
        :root { 
            --blue: #003087; --red: #d62828; 
            --bg: #ffffff; --text: #333333; --card: #fafafa; --border: #eeeeee;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333333;
            }
        }

        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: var(--bg); color: var(--text); transition: background 0.3s ease; overflow: hidden; }
        #app { padding: 20px; width: 100%; max-width: 400px; }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        
        /* Layout for Results */
        #result-area { min-height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .station-entry { margin-bottom: 15px; }
        .name-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .name { font-size: 2.8rem; font-weight: 900; color: var(--blue); line-height: 1.1; }
        .type-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); text-transform: uppercase; font-weight: bold; opacity: 0.7; color: var(--text); }
        
        .city-state { font-size: 1.1rem; color: #666; font-weight: 500; margin-bottom: 5px; }
        .freq { font-size: 3.5rem; font-weight: 200; color: var(--red); letter-spacing: -1px; margin: 0; }
        .dist { font-size: 1rem; margin-top: 5px; font-weight: 600; }
        
        .sig-strong { color: #2d6a4f; } 
        .sig-fringe { color: #d4a373; }  
        .sig-weak { color: #888; }      

        #filter-container { margin: 20px 0; }
        .filter-group { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 25px; padding: 4px; gap: 4px; }
        .filter-btn { flex: 1; border: none; background: transparent; color: #888; padding: 10px 5px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
        .filter-btn.active { background: var(--blue); color: white; }

        #zip-container { margin-top: 15px; display: none; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1.1rem; width: 100px; text-align: center; background: var(--bg); color: var(--text); outline: none; }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-main { padding: 12px 28px; border-radius: 25px; border: 1px solid var(--border); background: var(--card); font-size: 0.85rem; color: var(--text); font-weight: 600; cursor: pointer; width: 180px; }
        .btn-zip { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; margin-left: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Locating Signal...</div>
        
        <div id="result-area">
            </div>

        <div id="filter-container">
            <div class="filter-group">
                <button id="btn-primary" class="filter-btn" onclick="setMode('primary')">Primary Only</button>
                <button id="btn-all" class="filter-btn active" onclick="setMode('all')">All Stations</button>
                <button id="btn-boutique" class="filter-btn" onclick="setMode('boutique')">Boutique Only</button>
            </div>
        </div>

        <div id="zip-container">
            <input type="text" id="zip-input" inputmode="numeric" pattern="[0-9]*" placeholder="08108" maxlength="5">
            <button class="btn-zip" onclick="useZip()">GO</button>
        </div>

        <div class="controls">
            <button class="btn-main" onclick="refreshSignal()">Refresh Scan</button>
        </div>
    </div>

    <script src="stations.js"></script>

    <script>
        let currentLat = null;
        let currentLon = null;
        let currentMode = 'all';

        window.onload = refreshSignal;

        function refreshSignal() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentLat = pos.coords.latitude;
                        currentLon = pos.coords.longitude;
                        findSignal();
                    },
                    () => showZipFallback(),
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            } else {
                showZipFallback();
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            findSignal();
        }

        function showZipFallback() {
            document.getElementById('status').innerText = "Location Offline";
            document.getElementById('zip-container').style.display = "block";
        }

        async function useZip() {
            const zip = document.getElementById('zip-input').value;
            if (zip.length < 5) return;
            try {
                const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
                const data = await res.json();
                currentLat = parseFloat(data.places[0].latitude);
                currentLon = parseFloat(data.places[0].longitude);
                document.getElementById('zip-container').style.display = "none";
                findSignal();
            } catch (e) { alert("Invalid ZIP."); }
        }

        function findSignal() {
            if (!currentLat || !currentLon || typeof STATIONS === 'undefined') return;

            let bestStations = [];
            let minD = Infinity;

            let filteredList = STATIONS;
            if (currentMode === 'primary') {
                filteredList = STATIONS.filter(s => s.type === "Primary");
            } else if (currentMode === 'boutique') {
                filteredList = STATIONS.filter(s => s.type === "Boutique");
            }

            filteredList.forEach(s => {
                const d = getD(currentLat, currentLon, s.lat, s.lon);
                
                // Logic for finding the closest, allowing multiple for Boutique
                if (d < minD) {
                    minD = d;
                    bestStations = [s];
                } else if (currentMode === 'boutique' && Math.abs(d - minD) < 0.1) {
                    // If we are in Boutique mode and distance is the same, add to the list
                    bestStations.push(s);
                }
            });

            renderResults(bestStations, minD);
        }

        function renderResults(stations, distance) {
            const area = document.getElementById('result-area');
            area.innerHTML = '';
            document.getElementById('status').innerText = "Public Radio Finder";

            stations.forEach(s => {
                const div = document.createElement('div');
                div.className = 'station-entry';
                
                let strength = "sig-weak";
                let statusTxt = "Weak Signal";
                if (distance < 30) { strength = "sig-strong"; statusTxt = "Strong Signal"; }
                else if (distance < 60) { strength = "sig-fringe"; statusTxt = "Fringe Signal"; }

                div.innerHTML = `
                    <div class="name-container">
                        <div class="name">${s.call}</div>
                        <span class="type-tag">${s.type}</span>
                    </div>
                    <div class="city-state">${s.city}</div>
                    <div class="freq">${s.freq} FM</div>
                    <div class="dist ${strength}">${statusTxt} • ${distance.toFixed(1)} miles</div>
                `;
                area.appendChild(div);
            });
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
