<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder</title>
    <style>
        :root { --blue: #003087; --red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; color: #333; }
        #app { padding: 20px; width: 100%; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.2rem; font-weight: 900; color: var(--blue); margin: 15px 0; }
        .freq { font-size: 4rem; font-weight: 300; color: var(--red); }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Locating Signal...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
    </div>

    <script>
        // Cache-buster: Ensures the browser checks for new data every time
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, (err) => {
                    document.getElementById('status').innerText = "GPS Error. Check Settings.";
                }, { enableHighAccuracy: true, timeout: 10000 });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Fetch US NPR tagged stations
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?countrycode=US&tag=npr&limit=500&cachebust=${Date.now()}`);
                const stations = await res.json();

                // Priority keywords to find News/Talk over Classical
                const priority = ['wamc', 'whyy', 'wnyc', 'wamu', 'news', 'talk'];
                
                let closest = null;
                let minD = Infinity;

                stations.forEach(s => {
                    if (s.geo_lat && s.geo_long) {
                        let d = getD(lat, lon, s.geo_lat, s.geo_long);
                        
                        // Boost stations that match our priority keywords (WAMC, News, etc.)
                        const isPriority = priority.some(p => (s.name + s.tags).toLowerCase().includes(p));
                        const effectiveDistance = isPriority ? d * 0.5 : d; 

                        if (effectiveDistance < minD) {
                            minD = effectiveDistance;
                            trueDistance = d;
                            closest = s;
                        }
                    }
                });

                if (closest) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = closest.name.split(/[-|]/)[0].trim();
                    
                    const fMatch = (closest.name + " " + closest.tags).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = fMatch ? fMatch[0] + " FM" : "Search Dial";
                    
                    document.getElementById('meta').innerText = `${closest.state || ''} (${trueDistance.toFixed(1)} miles away)`;
                }
            } catch (e) { document.getElementById('status').innerText = "API Error"; }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
