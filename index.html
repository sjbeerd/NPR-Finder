<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Public Radio Finder</title>
    <style>
        :root { 
            --blue: #003087; --red: #d62828; 
            --bg: #ffffff; --text: #333333; --card: #fafafa; --border: #eeeeee;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333333; }
        }

        /* Absolute Centering Fix */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center; /* This centers the #app box perfectly */
        }

        #app { 
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: 800; }
        
        /* Result Area with Scrolling if needed */
        #result-area { 
            overflow-y: auto; 
            flex-grow: 1; 
            margin-bottom: 20px;
        }

        .station-entry { padding: 15px 0; border-bottom: 1px solid var(--border); }
        .station-entry:last-child { border-bottom: none; }

        .name-container { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .name { font-size: 2.2rem; font-weight: 900; color: var(--blue); line-height: 1; }
        .type-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 8px; border: 1px solid var(--border); text-transform: uppercase; font-weight: bold; opacity: 0.6; }
        
        .city-state { font-size: 0.9rem; color: #666; margin: 4px 0; }
        .freq { font-size: 2.8rem; font-weight: 200; color: var(--red); letter-spacing: -1px; margin: 0; }
        .dist { font-size: 0.85rem; font-weight: 700; margin-top: 4px; }
        
        .sig-strong { color: #2d6a4f; } 
        .sig-fringe { color: #d4a373; }  
        .sig-weak { color: #888; }      

        /* Interface Elements */
        #startup-container { padding: 20px 0; }
        .btn-gps { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 40px; font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 20px; }
        
        .zip-row { display: flex; gap: 10px; justify-content: center; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 1.1rem; width: 100px; text-align: center; background: var(--bg); color: var(--text); }
        .btn-zip { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #filter-container { display: none; }
        .filter-group { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 4px; gap: 4px; }
        .filter-btn { flex: 1; border: none; background: transparent; color: #888; padding: 10px 0; border-radius: 25px; font-size: 0.7rem; cursor: pointer; font-weight: 700; }
        .filter-btn.active { background: var(--blue); color: white; }

        .btn-reset { margin-top: 15px; background: none; border: none; color: #888; text-decoration: underline; font-size: 0.75rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Ready to Scan</div>
        
        <div id="startup-container">
            <button class="btn-gps" onclick="requestGPS()">📍 Use My Location</button>
            <div class="zip-row">
                <input type="text" id="zip-input" inputmode="numeric" placeholder="ZIP" maxlength="5">
                <button class="btn-zip" onclick="useZip()">Go</button>
            </div>
        </div>

        <div id="result-area"></div>

        <div id="filter-container">
            <div class="filter-group">
                <button id="btn-primary" class="filter-btn" onclick="setMode('primary')">Primary</button>
                <button id="btn-all" class="filter-btn active" onclick="setMode('all')">All</button>
                <button id="btn-boutique" class="filter-btn" onclick="setMode('boutique')">Boutique</button>
            </div>
            <button class="btn-reset" onclick="location.reload()">Start Over</button>
        </div>
    </div>

    <script src="stations.js"></script>

    <script>
        let currentLat = null, currentLon = null, currentMode = 'all';

        function requestGPS() {
            document.getElementById('status').innerText = "Locating...";
            navigator.geolocation.getCurrentPosition(
                p => { currentLat = p.coords.latitude; currentLon = p.coords.longitude; findSignal(); },
                e => { alert("GPS failed. Use ZIP."); document.getElementById('status').innerText = "Ready"; },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        async function useZip() {
            const zip = document.getElementById('zip-input').value;
            if (zip.length < 5) return;
            document.getElementById('status').innerText = "Checking ZIP...";
            try {
                const res = await fetch('https://api.zippopotam.us/us/' + zip);
                const data = await res.json();
                currentLat = parseFloat(data.places[0].latitude);
                currentLon = parseFloat(data.places[0].longitude);
                findSignal();
            } catch (e) { alert("ZIP not found."); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            findSignal();
        }

        function findSignal() {
            if (!currentLat || !currentLon) return;

            document.getElementById('startup-container').style.display = "none";
            document.getElementById('filter-container').style.display = "block";
            document.getElementById('status').innerText = "Closest Stations";

            // 1. Calculate distance for EVERY station
            let list = STATIONS.map(s => ({...s, d: getD(currentLat, currentLon, s.lat, s.lon)}));
            
            // 2. Sort by distance (closest first)
            list.sort((a, b) => a.d - b.d);

            // 3. Apply Mode Filter
            let filtered = list;
            if (currentMode === 'primary') filtered = list.filter(s => s.type === "Primary");
            if (currentMode === 'boutique') filtered = list.filter(s => s.type === "Boutique");

            // 4. Take the top 3 (This ensures WXPN/WRTI both show up)
            renderResults(filtered.slice(0, 3));
        }

        function renderResults(stations) {
            const area = document.getElementById('result-area');
            area.innerHTML = '';
            stations.forEach(s => {
                const div = document.createElement('div');
                div.className = 'station-entry';
                let strength = s.d < 30 ? "sig-strong" : (s.d < 60 ? "sig-fringe" : "sig-weak");
                let statusTxt = s.d < 30 ? "Strong" : (s.d < 60 ? "Fringe" : "Weak");
                div.innerHTML = `
                    <div class="name-container"><div class="name">${s.call}</div><span class="type-tag">${s.type}</span></div>
                    <div class="city-state">${s.city}</div>
                    <div class="freq">${s.freq} FM</div>
                    <div class="dist ${strength}">${statusTxt} • ${s.d.toFixed(1)} miles</div>
                `;
                area.appendChild(div);
            });
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.pow(Math.sin(dLat / 2), 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.pow(Math.sin(dLon / 2), 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
</body>
</html>
