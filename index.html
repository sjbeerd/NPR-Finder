<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Public Radio Finder</title>
    <style>
        :root { 
            --blue: #003087; --red: #d62828; 
            --bg: #ffffff; --text: #333333; --card: #fafafa; --border: #eeeeee;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333333;
            }
        }

        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            display: flex;
            justify-content: center;
        }

        #app { 
            width: 100%; 
            max-width: 420px; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .header-box { margin-bottom: 20px; text-align: center; }
        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        
        #result-area { flex-grow: 0; }
        .station-entry { padding: 20px 0; border-bottom: 1px solid var(--border); text-align: center; }
        .station-entry:last-child { border-bottom: none; }

        .name-container { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .name { font-size: 2.6rem; font-weight: 900; color: var(--blue); line-height: 1; }
        .type-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); text-transform: uppercase; font-weight: bold; }
        
        .city-state { font-size: 1.1rem; color: #666; margin-top: 6px; }
        .freq { font-size: 3.5rem; font-weight: 200; color: var(--red); letter-spacing: -2px; margin: 5px 0; }
        .dist { font-size: 0.95rem; font-weight: 700; }
        
        .sig-strong { color: #2d6a4f; } 
        .sig-fringe { color: #d4a373; }  
        .sig-weak { color: #888; }      

        #startup-container { margin: 60px 0; text-align: center; }
        .btn-gps { background: var(--blue); color: white; border: none; padding: 18px 0; border-radius: 35px; font-size: 1.2rem; font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(0,48,135,0.2); margin-bottom: 25px; }
        
        .zip-row { display: flex; gap: 10px; justify-content: center; align-items: center; }
        input { padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 1.2rem; width: 110px; text-align: center; background: var(--bg); color: var(--text); -webkit-appearance: none; }
        .btn-zip { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 14px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #filter-container { display: none; margin-top: 10px; }
        .filter-group { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 5px; gap: 5px; }
        .filter-btn { flex: 1; border: none; background: transparent; color: #888; padding: 12px 0; border-radius: 25px; font-size: 0.75rem; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .filter-btn.active { background: var(--blue); color: white; }

        .footer-controls { margin-top: 30px; text-align: center; display: none; }
        .btn-reset { background: none; border: none; color: #bbb; text-decoration: underline; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header-box">
            <div id="status" class="label">Ready to Scan</div>
        </div>
        
        <div id="startup-container">
            <button class="btn-gps" onclick="requestGPS()">📍 Use Current Location</button>
            <div class="zip-row">
                <input type="text" id="zip-input" inputmode="numeric" placeholder="ZIP" maxlength="5">
                <button class="btn-zip" onclick="useZip()">Search</button>
            </div>
        </div>

        <div id="result-area"></div>

        <div id="filter-container">
            <div class="filter-group">
                <button id="btn-primary" class="filter-btn" onclick="setMode('primary')">Primary</button>
                <button id="btn-all" class="filter-btn active" onclick="setMode('all')">All</button>
                <button id="btn-boutique" class="filter-btn" onclick="setMode('boutique')">Boutique</button>
            </div>
        </div>

        <div id="footer" class="footer-controls">
            <button class="btn-reset" onclick="resetApp()">Clear & Start Over</button>
        </div>
    </div>

    <script src="stations.js"></script>

    <script>
        let currentLat = null;
        let currentLon = null;
        let currentMode = 'all';

        function requestGPS() {
            document.getElementById('status').innerText = "Locating...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        currentLat = pos.coords.latitude;
                        currentLon = pos.coords.longitude;
                        findSignal();
                    },
                    function(err) {
                        alert("Could not get location. Try ZIP code.");
                        resetApp();
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        async function useZip() {
            const zip = document.getElementById('zip-input').value;
            if (zip.length < 5) return;
            document.getElementById('status').innerText = "Checking ZIP...";
            try {
                const res = await fetch('https://api.zippopotam.us/us/' + zip);
                const data = await res.json();
                currentLat = parseFloat(data.places[0].latitude);
                currentLon = parseFloat(data.places[0].longitude);
                findSignal();
            } catch (e) { alert("ZIP error."); resetApp(); }
        }

        function resetApp() {
            location.reload(); // Hard reset to ensure fresh state
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            findSignal();
        }

        function findSignal() {
            if (!currentLat || !currentLon) return;

            document.getElementById('startup-container').style.display = "none";
            document.getElementById('filter-container').style.display = "block";
            document.getElementById('footer').style.display = "block";

            let stationsWithDist = STATIONS.map(s => {
                return { ...s, d: getD(currentLat, currentLon, s.lat, s.lon) };
            });

            // Sort by distance absolute
            stationsWithDist.sort((a, b) => a.d - b.d);

            let results = [];

            if (currentMode === 'primary') {
                // Just the single closest Primary station
                const closest = stationsWithDist.find(s => s.type === "Primary");
                if (closest) results.push(closest);
            } 
            else if (currentMode === 'boutique') {
                // All Boutique stations within 15 miles
                results = stationsWithDist.filter(s => s.type === "Boutique" && s.d < 15);
                // Fallback: If none within 15, just show the single closest boutique
                if (results.length === 0) {
                    const closest = stationsWithDist.find(s => s.type === "Boutique");
                    if (closest) results.push(closest);
                }
            } 
            else {
                // 'All' mode: Show anything within 8 miles, or just the top 1 closest
                results = stationsWithDist.filter(s => s.d < 8);
                if (results.length === 0) results.push(stationsWithDist[0]);
            }

            renderResults(results);
        }

        function renderResults(stations) {
            const area = document.getElementById('result-area');
            area.innerHTML = '';
            document.getElementById('status').innerText = "Nearby Stations";

            stations.forEach(s => {
                const div = document.createElement('div');
                div.className = 'station-entry';
                let strength = s.d < 30 ? "sig-strong" : (s.d < 60 ? "sig-fringe" : "sig-weak");
                let statusTxt = s.d < 30 ? "Strong" : (s.d < 60 ? "Fringe" : "Weak");

                div.innerHTML = `
                    <div class="name-container"><div class="name">${s.call}</div><span class="type-tag">${s.type}</span></div>
                    <div class="city-state">${s.city}</div>
                    <div class="freq">${s.freq} FM</div>
                    <div class="dist ${strength}">${statusTxt} Signal • ${s.d.toFixed(1)} miles</div>
                `;
                area.appendChild(div);
            });
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.pow(Math.sin(dLat / 2), 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.pow(Math.sin(dLon / 2), 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
</body>
</html>
