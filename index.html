<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPR Finder</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #ffffff;
            color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        #container { padding: 20px; }
        .status { font-size: 1.1rem; color: #666; margin-bottom: 10px; }
        .station-name { font-size: 3rem; font-weight: 800; color: #003087; margin: 10px 0; }
        .frequency { font-size: 1.8rem; color: #d62828; }
        .dist { margin-top: 15px; color: #888; }
    </style>
</head>
<body>
    <div id="container">
        <div id="status" class="status">Locating...</div>
        <div id="name" class="station-name"></div>
        <div id="freq" class="frequency"></div>
        <div id="meta" class="dist"></div>
    </div>
    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, () => {
                    document.getElementById('status').innerText = "Please enable location.";
                });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Fetch the 100 closest stations to your current GPS
                const url = `https://de1.api.radio-browser.info/json/stations/search?lat=${lat}&long=${lon}&limit=100&hidebroken=true&order=distance`;
                const res = await fetch(url);
                const stations = await res.json();

                // Nationwide Public Radio identifiers
                const publicKeywords = ['npr', 'public radio', 'public broadcasting', 'news/talk', 'university', 'college'];
                
                // 1. Try to find the closest station that is explicitly Public Radio
                let bestMatch = stations.find(s => {
                    const content = (s.name + s.tags).toLowerCase();
                    return publicKeywords.some(k => content.includes(k));
                });

                // 2. If no "Public" match, fallback to the absolute closest station
                if (!bestMatch) bestMatch = stations[0];

                if (bestMatch) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    
                    // Look for a frequency (e.g., 91.7 or 103.9) in the name or tags
                    const freqMatch = (bestMatch.name + " " + bestMatch.tags).match(/\d{2,3}\.\d/);
                    const frequency = freqMatch ? freqMatch[0] : "Check Dial";

                    // Clean up the name (remove stream URLs or extra dashes)
                    const cleanName = bestMatch.name.split(/[-|]/)[0].trim();

                    document.getElementById('name').innerText = cleanName;
                    document.getElementById('freq').innerText = `${frequency} FM`;
                    
                    const d = getD(lat, lon, bestMatch.geo_lat, bestMatch.geo_long);
                    document.getElementById('meta').innerText = `Near ${bestMatch.state || 'Current Location'} (${d.toFixed(1)} miles away)`;
                }
            } catch (e) { 
                document.getElementById('status').innerText = "Searching..."; 
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
