<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder</title>
    <style>
        :root { --blue: #003087; --red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; }
        #app { padding: 20px; width: 100%; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.2rem; font-weight: 900; color: var(--blue); margin: 15px 0; }
        .freq { font-size: 4rem; font-weight: 300; color: var(--red); }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
        #refresh-btn { margin-top: 25px; padding: 12px 24px; border-radius: 25px; border: 1px solid #eee; background: #fafafa; font-size: 0.8rem; color: #666; font-weight: 600; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Scanning News...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
        <button id="refresh-btn" onclick="location.reload()">Refresh Signal</button>
    </div>

    <script>
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findStation, (err) => {
                    document.getElementById('status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true, timeout: 7000, maximumAge: 0 });
            }
        };

        async function findStation(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                // Fetch up to 500 US stations with 'npr' or 'public' tags
                const cb = Date.now();
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/search?countrycode=US&name=public&tag=npr&limit=500&cb=${cb}`);
                const stations = await res.json();

                // High-priority keywords for News/Talk/Information
                const newsKeywords = ['news', 'talk', 'info', 'wamc', 'whyy', 'wnyc', 'wamu', 'kqed', 'kcrw'];
                // Lower-priority keywords for Classical/Music
                const musicKeywords = ['classical', 'jazz', 'music'];
                
                let newsMatches = [];
                let otherMatches = [];

                stations.forEach(s => {
                    if (s.geo_lat && s.geo_long) {
                        const d = getD(lat, lon, s.geo_lat, s.geo_long);
                        const content = (s.name + s.tags).toLowerCase();
                        
                        const isMusic = musicKeywords.some(k => content.includes(k));
                        const isNews = newsKeywords.some(k => content.includes(k));

                        // Store distance and station info
                        const stationData = { ...s, dist: d };

                        if (isNews && !isMusic) {
                            newsMatches.push(stationData);
                        } else {
                            otherMatches.push(stationData);
                        }
                    }
                });

                // Sort both buckets by distance
                newsMatches.sort((a, b) => a.dist - b.dist);
                otherMatches.sort((a, b) => a.dist - b.dist);

                // FINAL SELECTION: Give us the closest News station. 
                // Only show Music if no News station is found within 100 miles.
                let best = null;
                if (newsMatches.length > 0 && newsMatches[0].dist < 100) {
                    best = newsMatches[0];
                } else {
                    best = otherMatches[0];
                }

                if (best) {
                    document.getElementById('status').innerText = "Tune Your Radio To:";
                    document.getElementById('name').innerText = best.name.split(/[-|]/)[0].trim();
                    
                    const fMatch = (best.name + " " + best.tags).match(/\d{2,3}\.\d/);
                    document.getElementById('freq').innerText = fMatch ? fMatch[0] + " FM" : "Search Dial";
                    
                    document.getElementById('meta').innerText = `${best.state || ''} (${best.dist.toFixed(1)} miles away)`;
                }
            } catch (e) { 
                document.getElementById('status').innerText = "Network Error"; 
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
