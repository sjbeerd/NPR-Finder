<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPR Finder: ME to VA</title>
    <style>
        :root { --blue: #003087; --red: #d62828; }
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; background: #fff; color: #333; }
        #app { padding: 20px; width: 100%; max-width: 400px; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 2.8rem; font-weight: 900; color: var(--blue); margin: 15px 0; line-height: 1.1; }
        .freq { font-size: 4.5rem; font-weight: 200; color: var(--red); letter-spacing: -1px; }
        .dist { font-size: 1rem; color: #bbb; margin-top: 20px; }
        button { margin-top: 30px; padding: 12px 24px; border-radius: 25px; border: 1px solid #eee; background: #fafafa; font-size: 0.8rem; color: #666; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status" class="label">Pinging Satellites...</div>
        <div id="name" class="name"></div>
        <div id="freq" class="freq"></div>
        <div id="meta" class="dist"></div>
        <button onclick="location.reload()">Refresh Signal</button>
    </div>

    <script>
        const STATIONS = [
            // --- NEW ENGLAND (ME, NH, VT, MA, RI, CT) ---
            {"call":"WMEA","freq":"90.1","lat":43.66,"lon":-70.25,"city":"Portland, ME"},
            {"call":"WMEP","freq":"90.5","lat":44.80,"lon":-68.77,"city":"Bangor, ME"},
            {"call":"WMEW","freq":"91.3","lat":44.31,"lon":-69.77,"city":"Waterville, ME"},
            {"call":"WMEM","freq":"106.1","lat":46.68,"lon":-68.01,"city":"Presque Isle, ME"},
            {"call":"WMEH","freq":"90.9","lat":44.72,"lon":-67.46,"city":"Machias, ME"},
            {"call":"WEVO","freq":"89.1","lat":43.20,"lon":-71.53,"city":"Concord, NH"},
            {"call":"WEVH","freq":"91.3","lat":43.70,"lon":-72.28,"city":"Hanover, NH"},
            {"call":"WEVN","freq":"90.7","lat":44.38,"lon":-71.20,"city":"Littleton, NH"},
            {"call":"WVPS","freq":"107.9","lat":44.47,"lon":-73.21,"city":"Burlington, VT"},
            {"call":"WRVT","freq":"88.7","lat":43.60,"lon":-72.97,"city":"Rutland, VT"},
            {"call":"WBUR","freq":"90.9","lat":42.34,"lon":-71.10,"city":"Boston, MA"},
            {"call":"WFCR","freq":"88.5","lat":42.38,"lon":-72.52,"city":"Amherst, MA"},
            {"call":"WNPN","freq":"89.3","lat":41.82,"lon":-71.41,"city":"Providence, RI"},
            {"call":"WNPR","freq":"90.5","lat":41.76,"lon":-72.67,"city":"Hartford, CT"},

            // --- MID-ATLANTIC (NY, NJ, PA, DE, MD, DC) ---
            {"call":"WNYC","freq":"93.9","lat":40.74,"lon":-73.98,"city":"New York, NY"},
            {"call":"WAMC","freq":"90.3","lat":42.50,"lon":-73.91,"city":"Albany, NY"},
            {"call":"WAMC","freq":"91.7","lat":41.72,"lon":-73.91,"city":"Poughkeepsie, NY"},
            {"call":"WNJT","freq":"88.1","lat":40.22,"lon":-74.75,"city":"Trenton, NJ"},
            {"call":"WNJB","freq":"89.3","lat":39.42,"lon":-75.22,"city":"Bridgeton, NJ"},
            {"call":"WNJM","freq":"89.9","lat":39.69,"lon":-74.22,"city":"Manahawkin, NJ"},
            {"call":"WHYY","freq":"90.9","lat":39.95,"lon":-75.16,"city":"Philadelphia, PA"},
            {"call":"WITF","freq":"89.5","lat":40.26,"lon":-76.88,"city":"Harrisburg, PA"},
            {"call":"WVIA","freq":"89.9","lat":41.33,"lon":-75.76,"city":"Scranton, PA"},
            {"call":"WDDE","freq":"91.1","lat":39.15,"lon":-75.52,"city":"Dover, DE"},
            {"call":"WYPR","freq":"88.1","lat":39.29,"lon":-76.61,"city":"Baltimore, MD"},
            {"call":"WSDL","freq":"90.7","lat":38.36,"lon":-75.59,"city":"Ocean City, MD"},
            {"call":"WAMU","freq":"88.5","lat":38.93,"lon":-77.08,"city":"Washington, DC"},

            // --- SOUTHERN TIER (VA, WV) ---
            {"call":"WVTF","freq":"89.1","lat":37.19,"lon":-80.15,"city":"Roanoke, VA"},
            {"call":"WVTU","freq":"89.3","lat":38.03,"lon":-78.47,"city":"Charlottesville, VA"},
            {"call":"WRIQ","freq":"89.7","lat":37.33,"lon":-77.10,"city":"Richmond, VA"},
            {"call":"WHRV","freq":"89.5","lat":36.85,"lon":-76.28,"city":"Norfolk, VA"},
            {"call":"WVPN","freq":"88.5","lat":38.35,"lon":-81.63,"city":"Charleston, WV"},
            {"call":"WVPM","freq":"90.9","lat":39.63,"lon":-79.95,"city":"Morgantown, WV"},
            {"call":"WVEP","freq":"88.9","lat":39.46,"lon":-77.96,"city":"Martinsburg, WV"}
        ];

        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(findSignal, (err) => {
                    document.getElementById('status').innerText = "GPS Error: Check Permission";
                }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
            }
        };

        function findSignal(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            let best = null;
            let minD = Infinity;

            STATIONS.forEach(s => {
                const d = getD(lat, lon, s.lat, s.lon);
                if (d < minD) {
                    minD = d;
                    best = s;
                }
            });

            if (best) {
                document.getElementById('status').innerText = "Strongest News Signal:";
                document.getElementById('name').innerText = best.call;
                document.getElementById('freq').innerText = best.freq + " FM";
                document.getElementById('meta').innerText = `${best.city} (${minD.toFixed(1)} miles away)`;
            }
        }

        function getD(lat1, lon1, lat2, lon2) {
            const R = 3958.8;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
